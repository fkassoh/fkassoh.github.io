const SLIDES =

 {
  "section": "Introduction",
  "sectionStart": true,
  "theme": "light",
  "kicker": "CHAPTER 12 · WEEK 12",
  "title": "Quantifying Uncertainty",
  "sub": "How a rational agent reasons when it cannot be certain — degrees of belief, not just true and false.",
  "body": "\n    <div class='grid2'>\n      <div class='card amber'>\n        <h2>What this lecture covers</h2>\n        <p>Every agent we've built so far — logical agents in Chapter 7, planners in Chapter 11 — assumed the world was fully knowable. Today we drop that assumption and give the agent a rigorous language for <em>partial</em> knowledge: probability.</p>\n      </div>\n      <div class='card green'>\n        <h2 class='g'>Teaching goal</h2>\n        <p>By the end of today, you should be able to write down a joint probability distribution, compute any probability from it, recognize independence, and apply Bayes' rule to go from an observation back to its most likely cause.</p>\n      </div>\n    </div>\n    <div class='callout'>This deck has built-in presenter notes. Press <b>N</b> at any time to open a teleprompter-style script for the slide on screen, and use the section dropdown at top-right to jump anywhere in the chapter.</div>\n  ",
  "notes": "Welcome to Chapter 12, Quantifying Uncertainty. Every agent we've built this semester — the logical agents of Chapter 7, the planners of Chapter 11 — assumed the world was, in principle, fully knowable: every fact was either true, false, or simply not yet inferred. Today that assumption breaks, deliberately. Real agents — a doctor, a self-driving car, a spam filter — constantly have to act on incomplete information. Probability theory is the rigorous mathematical language for exactly that situation: not 'I don't know,' but 'here is precisely how confident I am, and why.' My goal for you today is concrete: by the end of this lecture, you should be able to write down a joint probability distribution over a small set of variables, use it to answer any probability question about that world, recognize when two variables are independent, and apply Bayes' rule to reason backward from an observation to its likely cause. That last skill — Bayes' rule — is arguably the single most useful piece of mathematics in this entire course, and we'll spend real time on it."
 },
 {
  "section": "Introduction",
  "theme": "light",
  "kicker": "ROADMAP",
  "title": "How This Lecture Unfolds",
  "sub": "Seven sections, building from notation to a fully worked probabilistic inference.",
  "body": "\n    <div class='grid3'>\n      <div class='card blue'><h2>12.1 — Acting Under Uncertainty</h2><p>Why logic alone breaks down, and how probability rescues rational decision-making.</p></div>\n      <div class='card blue'><h2>12.2 — Basic Notation</h2><p>Random variables, prior and conditional probability, and the joint distribution.</p></div>\n      <div class='card blue'><h2>12.3 — Inference from the Joint</h2><p>Answering any probability question by summing over a table of atomic events.</p></div>\n      <div class='card amber'><h2>12.4 — Independence</h2><p>When knowing one fact tells you nothing about another — and why that's a gift.</p></div>\n      <div class='card amber'><h2>12.5 — Bayes' Rule</h2><p>Turning P(evidence given cause) into P(cause given evidence) — diagnosis, formalized.</p></div>\n      <div class='card amber'><h2>12.6 — Naive Bayes</h2><p>A simplifying independence assumption that scales Bayes' rule to many pieces of evidence.</p></div>\n    </div>\n    <div class='callout green'><b>12.7 — The Wumpus World, Revisited</b> closes the loop: using everything from today to make a genuinely rational decision under uncertainty, in the exact environment where Chapter 7's logical agent got stuck.</div>\n  ",
  "notes": "Here's the map for today, seven sections building in a straight line. 12.1 motivates the whole chapter — why a purely logical agent gets stuck the moment the world isn't fully knowable. 12.2 gives us vocabulary: random variables, prior probability, conditional probability, and the single most important object in the chapter, the joint probability distribution. 12.3 shows that once you have that joint distribution, every probability question you could possibly ask has a mechanical answer — just sum the right cells. 12.4 introduces independence, which is what keeps these tables from becoming unmanageably large. 12.5 is the heart of the lecture: Bayes' rule, which lets us flip a conditional probability around — from 'how likely is this symptom given the disease' to 'how likely is the disease given this symptom.' 12.6 scales that idea to many pieces of evidence at once, using an assumption called naive Bayes. And 12.7 brings it all home by returning to the wumpus world from Chapter 7, where the logical agent could reason about certainty but got stuck the moment it had two equally 'unknown' squares to choose between — probability breaks that tie."
 },
 {
  "section": "Introduction",
  "kicker": "MOTIVATION",
  "title": "Why Probability, and Why Now?",

  "body": "\n    <div class='grid2'>\n      <div class='card red'>\n        <h2>The qualification problem</h2>\n        <p>Consider a simple logical rule: <span class='mono'>Toothache ⇒ Cavity</span>. It's wrong — toothaches also come from gum disease, abscesses, or cracked fillings. Fix it by listing every possible cause? The list is <em>never</em> complete — this is called the <b>qualification problem</b>, and it defeats purely logical rules for anything but toy domains.</p>\n      </div>\n      <div class='card green'>\n        <h2 class='g'>What probability adds</h2>\n        <ul class='check'>\n          <li>Instead of an all-or-nothing rule, we assign a <b>degree of belief</b>: P(Cavity | Toothache) = 0.6, say.</li>\n          <li>The agent can act rationally even while genuinely uncertain — no need to enumerate every possible exception in advance.</li>\n        </ul>\n      </div>\n    </div>\n    <div class='callout'>Real systems built on exactly this idea: medical diagnostic support systems, spam filters, self-driving perception stacks, and weather forecasting — none of them wait for certainty; all of them compute and act on a probability.</div>\n  ",

/* =====================================================================
   ENGINE (plain viewer — no gating, no questions, no localStorage answers)
   ===================================================================== */
let current = 0;
const total = SLIDES.length;

function buildNav(){
  const sel = document.getElementById('sectionSelect');
  sel.innerHTML = '';
  SLIDES.forEach((s,i)=>{
    if (s.sectionStart){
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = s.section;
      sel.appendChild(opt);
    }
  });
}

function updateSectionSelectValue(){
  let idx = 0;
  for (let i = 0; i <= current; i++){ if (SLIDES[i].sectionStart) idx = i; }
  document.getElementById('sectionSelect').value = idx;
}

function render(){
  const s = SLIDES[current];
  const themeClass = 'theme-' + (s.theme || 'dark');
  document.querySelector('.slide').className = 'slide ' + themeClass;

  document.getElementById('kicker').textContent = s.kicker || '';
  document.getElementById('kicker').style.display = s.kicker ? 'inline-block' : 'none';
  document.getElementById('title').textContent = s.title || '';
  const subEl = document.getElementById('sub');
  if (s.sub){ subEl.style.display='block'; subEl.textContent = s.sub; } else { subEl.style.display='none'; }

  document.getElementById('bodyEl').innerHTML = s.body || '';
  document.getElementById('notesText').innerHTML = s.notes || '<em>No additional explanation for this slide.</em>';
  document.getElementById('counter').textContent = (current+1) + ' / ' + total;
  document.getElementById('progressFill').style.width = ((current+1)/total*100) + '%';
  updateSectionSelectValue();

  document.getElementById('prevBtn').disabled = current===0;
  document.getElementById('nextBtn').disabled = current===total-1;
  document.getElementById('stage').scrollTop = 0;

  try { localStorage.setItem('ch12_plain_last_slide', String(current)); } catch(e){ /* ignore */ }
}

function go(n){
  current = Math.max(0, Math.min(total-1, n));
  render();
}
function next(){ go(current+1); }
function prev(){ go(current-1); }

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('sectionSelect').addEventListener('change', e=>{
  go(parseInt(e.target.value,10));
});

function toggleNotes(force){
  const d = document.getElementById('notesDrawer');
  const willOpen = typeof force === 'boolean' ? force : !d.classList.contains('open');
  d.classList.toggle('open', willOpen);
  d.setAttribute('aria-hidden', String(!willOpen));
  document.getElementById('notesBtn').setAttribute('aria-pressed', String(willOpen));
}
document.getElementById('notesBtn').addEventListener('click', ()=>toggleNotes());
document.getElementById('closeNotesBtn').addEventListener('click', ()=>toggleNotes(false));

function toggleFullscreen(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
  else { document.exitFullscreen(); }
}
document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);

document.addEventListener('keydown', e=>{
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'SELECT' || tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.key==='Escape'){ toggleNotes(false); return; }
  if (e.key==='ArrowRight' || e.key==='PageDown'){ next(); e.preventDefault(); }
  else if (e.key==='ArrowLeft' || e.key==='PageUp'){ prev(); e.preventDefault(); }
  else if (e.key==='Home'){ go(0); }
  else if (e.key==='End'){ go(total-1); }
  else if (e.key.toLowerCase()==='n'){ toggleNotes(); }
  else if (e.key.toLowerCase()==='f'){ toggleFullscreen(); }
});

let touchStartX = 0;
document.getElementById('stage').addEventListener('touchstart', e=>{ touchStartX = e.changedTouches[0].screenX; }, {passive:true});
document.getElementById('stage').addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (dx > 60) prev(); else if (dx < -60) next();
}, {passive:true});

// on load: resume at last-viewed slide (simple convenience, not gated)
buildNav();
let resumeIdx = 0;
try {
  const saved = parseInt(localStorage.getItem('ch12_plain_last_slide'), 10);
  if (!isNaN(saved) && saved >= 0 && saved < total) resumeIdx = saved;
} catch(e){ /* ignore */ }
current = resumeIdx;
render();
</script>
